<!DOCTYPE html>
<html>

<head>
<title>CosmicHeist</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family: Arial, sans-serif;
    color:white;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

.container{
    text-align:center;
    margin-top:150px;
    background: rgba(0,0,0,0.65);
    padding:60px;
    width:70%;
    margin-left:auto;
    margin-right:auto;
    border-radius:10px;
}

h1{
    font-size:60px;
}

p{
    font-size:22px;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h1>CosmicHeist</h1>
<p><em>Stealing the secrets of the universe</em></p>
<p>Exploring physics, cosmology, entropy, and the deep structure of reality.</p>

</div>

<script>

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<300;i++){
stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*0.5,
    color: `hsl(${Math.random()*360}, 80%, 80%)`
});
}

function animate(){

    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

stars.forEach(star=>{

    ctx.fillStyle = star.color;

    ctx.beginPath();
    ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
    ctx.fill();

    star.y += star.speed;

    if(star.y > canvas.height){
        star.y = 0;
        star.x = Math.random()*canvas.width;
    }

});

    requestAnimationFrame(animate);
}

animate();

</script>

</body>

</html>
